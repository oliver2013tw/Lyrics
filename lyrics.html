<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Get Lyrics</title>
    <style>
        /* 全局重置：打造 App 般的沉浸感 */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body { 
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; 
            background: linear-gradient(145deg, #0b0e11 0%, #1a1d23 100%);
            background-attachment: fixed;
            height: 100vh;
            color: #ffffff; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            overflow: hidden; /* 禁止全頁面滾動 */
            padding: 20px 15px;
        }

        /* 液態玻璃卡片基礎 */
        .glass-panel {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            width: 100%;
            max-width: 480px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.6);
        }

        /* 頂部操作區塊 */
        .top-section { margin-bottom: 16px; width: 100%; max-width: 480px; }
        
        .search-container {
            padding: 10px;
            display: flex;
            gap: 10px;
        }
        .search-input {
            flex: 1;
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            padding: 14px 18px;
            color: white;
            font-size: 16px;
            outline: none;
            transition: 0.3s;
        }
        .search-input:focus { 
            border-color: #1db954; 
            background: rgba(0, 0, 0, 0.6);
            box-shadow: 0 0 15px rgba(29, 185, 84, 0.2);
        }
        .search-btn {
            background: #1db954; color: white; border: none; border-radius: 16px;
            padding: 0 24px; font-weight: 700; cursor: pointer; transition: 0.2s;
        }
        .search-btn:active { transform: scale(0.92); }

        /* 下載按鈕：僅在成功搜尋後顯示 */
        #downloadBtn {
            display: none;
            width: calc(100% - 20px);
            margin: 0 10px 10px 10px;
            padding: 10px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(29, 185, 84, 0.3);
            border-radius: 12px;
            color: #1db954;
            font-size: 13px;
            font-weight: 700;
            cursor: pointer;
            text-align: center;
            transition: 0.3s;
            animation: fadeIn 0.4s ease-out;
        }
        #downloadBtn:hover { background: rgba(29, 185, 84, 0.1); }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(-5px); } to { opacity: 1; transform: translateY(0); } }

        /* 歌詞主板塊 */
        .main-display {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            margin-bottom: 20px;
        }

        /* Live 預留區域 (Spotify Logo) */
        .live-preview-top {
            padding: 20px 0 15px;
            text-align: center;
            opacity: 0.4;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }
        .spotify-logo { height: 26px; object-fit: contain; margin-bottom: 6px; }
        .live-tag { font-size: 10px; letter-spacing: 3px; color: #1db954; font-weight: 800; }

        /* 歌詞顯示核心區 */
        .lyrics-viewport {
            flex: 1;
            overflow-y: auto;
            padding: 30px 25px;
            text-align: center;
            overscroll-behavior: contain;
            scroll-behavior: smooth;
        }
        .lyrics-viewport::-webkit-scrollbar { width: 4px; }
        .lyrics-viewport::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 10px; }

        .lyric-line {
            font-size: 20px;
            line-height: 2.4;
            margin-bottom: 18px;
            color: rgba(255, 255, 255, 0.75);
            transition: color 0.3s;
        }

        /* Spotify 風格載入動畫 */
        .loader {
            display: none;
            justify-content: center;
            align-items: center;
            gap: 6px;
            height: 40px;
            margin-top: 45%;
        }
        .loader span { 
            width: 4px; height: 20px; background: #1db954; border-radius: 10px; 
            animation: loading 1.2s infinite ease-in-out; 
        }
        .loader span:nth-child(2) { animation-delay: 0.1s; }
        .loader span:nth-child(3) { animation-delay: 0.2s; }
        .loader span:nth-child(4) { animation-delay: 0.3s; }
        @keyframes loading { 0%, 40%, 100% { transform: scaleY(0.4); } 20% { transform: scaleY(1.2); } }

        /* 底部模式切換 */
        .mode-bar {
            padding: 6px; display: flex; background: rgba(0, 0, 0, 0.5); border-radius: 50px; 
            width: 100%; max-width: 320px; border: 1px solid rgba(255, 255, 255, 0.05);
        }
        .mode-item { 
            flex: 1; padding: 12px; text-align: center; font-size: 13px; font-weight: 700; 
            border-radius: 40px; color: rgba(255, 255, 255, 0.4); 
        }
        .mode-item.active { background: rgba(255, 255, 255, 0.12); color: #ffffff; }
        .mode-item.disabled { opacity: 0.3; cursor: not-allowed; }
        .coming-soon { font-size: 8px; color: #1db954; display: block; margin-top: 2px; }

        .status-msg { color: rgba(255, 255, 255, 0.3); margin-top: 45%; font-size: 15px; font-weight: 500; }
    </style>
</head>
<body>

    <div class="glass-panel top-section">
        <div class="search-container">
            <input type="text" id="searchInput" class="search-input" placeholder="搜尋：歌名,歌手" autocomplete="off">
            <button onclick="searchLyrics()" class="search-btn">搜尋</button>
        </div>
        <div id="downloadBtn" onclick="downloadTxt()">📥 下載純文字歌詞 (.txt)</div>
    </div>

    <div class="glass-panel main-display">
        <div class="live-preview-top">
            <img src="Spotify.png" alt="Spotify" class="spotify-logo">
            <div class="live-tag">LIVE SYNC OFF</div>
        </div>
        
        <div id="lyricsViewport" class="lyrics-viewport">
            <div id="loader" class="loader">
                <span></span><span></span><span></span><span></span>
            </div>
            <div id="statusMsg" class="status-msg">輸入歌名，同步你的音樂頻率</div>
        </div>
    </div>

    <div class="mode-bar">
        <div class="mode-item active">搜尋模式</div>
        <div class="mode-item disabled">
            Spotify Live
            <span class="coming-soon">COMING SOON</span>
        </div>
    </div>

    <script>
        // 全域變數鎖定當前搜尋內容
        let currentLyricsText = "";
        let currentSongTitle = "";

        document.getElementById("searchInput").addEventListener("keypress", (e) => {
            if (e.key === "Enter") searchLyrics();
        });

        async function searchLyrics() {
            const query = document.getElementById('searchInput').value.trim();
            const viewport = document.getElementById('lyricsViewport');
            const loader = document.getElementById('loader');
            const statusMsg = document.getElementById('statusMsg');
            const dlBtn = document.getElementById('downloadBtn');
            
            if (!query) return;

            // 初始化狀態：清空舊資料、隱藏下載鈕、顯示動畫
            currentLyricsText = "";
            currentSongTitle = "";
            dlBtn.style.display = 'none';
            statusMsg.style.display = 'none';
            viewport.querySelectorAll('.lyric-line').forEach(el => el.remove());
            loader.style.display = 'flex';

            try {
                // 串接你的 Vercel API
                const response = await fetch(`https://lyrics-back.vercel.app/api/get?track_name=${encodeURIComponent(query)}`);
                const data = await response.json();

                loader.style.display = 'none';

                if (data.status === "success" && data.syncedLyrics) {
                    let html = "";
                    let cleanLyricsArray = [];
                    
                    // 鎖定歌名
                    currentSongTitle = data.title || query.split(',')[0];

                    data.syncedLyrics.forEach(line => {
                        // 解析 [時間] 與 歌詞文字
                        const match = line.match(/^(\[\d{2}:\d{2}\.\d{2,3}\])(.*)/);
                        if (match) {
                            const time = match[1];
                            const text = match[2].trim();
                            if(text) {
                                // 時間標籤藏在 data-time，畫面只顯示文字
                                html += `<div class="lyric-line" data-time="${time}">${text}</div>`;
                                cleanLyricsArray.push(text);
                            }
                        } else if(line.trim()) {
                            html += `<div class="lyric-line">${line}</div>`;
                            cleanLyricsArray.push(line.trim());
                        }
                    });

                    viewport.innerHTML = html;
                    viewport.scrollTop = 0;
                    
                    // 紀錄純文字歌詞並開啟下載按鈕
                    currentLyricsText = cleanLyricsArray.join('\n');
                    if(currentLyricsText) dlBtn.style.display = 'block';
                    
                } else {
                    statusMsg.style.display = 'block';
                    statusMsg.innerText = "找不到歌詞，請嘗試：歌名,歌手";
                }
            } catch (error) {
                loader.style.display = 'none';
                statusMsg.style.display = 'block';
                statusMsg.innerText = "連線失敗，請檢查 API 伺服器";
            }
        }

        // 下載功能：解決中文亂碼
        function downloadTxt() {
            if (!currentLyricsText || !currentSongTitle) return;

            // 加入 \ufeff (BOM) 以確保 Windows 記事本正確識別 UTF-8
            const blob = new Blob(['\ufeff' + currentLyricsText], { type: 'text/plain;charset=utf-8' });
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            
            a.href = url;
            a.download = `${currentSongTitle}-歌詞.txt`;
            
            document.body.appendChild(a);
            a.click();
            
            // 非同步清理，確保下載動作已觸發
            setTimeout(() => {
                window.URL.revokeObjectURL(url);
                document.body.removeChild(a);
            }, 0);
        }
    </script>
</body>
</html>
