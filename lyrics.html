<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>歌詞同步播放器 | 專業版</title>
    <style>
        /* 全局重置與防止拉動 */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; 
            background: linear-gradient(145deg, #0b0e11 0%, #1a1d23 100%);
            height: 100vh;
            color: #ffffff; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            overflow: hidden; 
            padding: 25px 15px;
        }

        /* 液態玻璃卡片 */
        .glass-panel {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 24px;
            width: 100%;
            max-width: 480px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5);
        }

        /* 搜尋區塊 */
        .search-container {
            padding: 12px;
            display: flex;
            gap: 10px;
            margin-bottom: 16px;
        }
        .search-input {
            flex: 1;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 14px;
            padding: 12px 16px;
            color: white;
            font-size: 15px;
            outline: none;
            transition: 0.3s;
        }
        .search-input:focus { border-color: #1db954; background: rgba(0, 0, 0, 0.5); }
        .search-btn {
            background: #1db954; color: white; border: none; border-radius: 14px;
            padding: 0 20px; font-weight: 600; cursor: pointer; transition: 0.2s;
        }

        /* 歌詞/Live 主板塊 */
        .main-display {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            margin-bottom: 20px;
            position: relative;
        }

        /* Live 預留區域 (上部分) */
        .live-preview-top {
            padding: 20px 0 10px;
            text-align: center;
            opacity: 0.4; /* 未啟用狀態的透明度 */
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }
        .spotify-logo {
            height: 28px;
            object-fit: contain;
            margin-bottom: 5px;
        }
        .live-tag {
            font-size: 10px;
            letter-spacing: 2px;
            color: #1db954;
            font-weight: bold;
            text-transform: uppercase;
        }

        /* 歌詞捲動區 */
        .lyrics-viewport {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            text-align: center;
            overscroll-behavior: contain;
            scroll-behavior: smooth;
        }
        .lyrics-viewport::-webkit-scrollbar { width: 4px; }
        .lyrics-viewport::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 10px; }

        .lyric-line {
            font-size: 19px;
            line-height: 2.2;
            margin-bottom: 15px;
            color: rgba(255, 255, 255, 0.7);
            transition: 0.4s;
        }

        /* 載入動畫 (Spotify Style Bars) */
        .loader {
            display: none; /* 預設隱藏 */
            justify-content: center;
            align-items: center;
            gap: 5px;
            height: 50px;
            margin-top: 40%;
        }
        .loader span {
            width: 4px; height: 20px; background: #1db954;
            animation: loading 1.2s infinite ease-in-out;
        }
        .loader span:nth-child(2) { animation-delay: 0.1s; }
        .loader span:nth-child(3) { animation-delay: 0.2s; }
        .loader span:nth-child(4) { animation-delay: 0.3s; }
        @keyframes loading {
            0%, 40%, 100% { transform: scaleY(0.4); }
            20% { transform: scaleY(1); }
        }

        /* 底部模式切換 */
        .mode-bar {
            padding: 6px;
            display: flex;
            background: rgba(0, 0, 0, 0.4);
            border-radius: 50px;
            width: 100%;
            max-width: 320px;
        }
        .mode-item {
            flex: 1; padding: 10px; text-align: center; font-size: 13px; font-weight: 600;
            border-radius: 40px; color: rgba(255, 255, 255, 0.4);
        }
        .mode-item.active { background: rgba(255, 255, 255, 0.1); color: #ffffff; }
        .mode-item.disabled {
            opacity: 0.2;
            cursor: not-allowed;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        .coming-soon { font-size: 8px; color: #1db954; margin-top: 2px; }

        .status-msg { color: rgba(255, 255, 255, 0.3); margin-top: 40%; font-size: 14px; }
    </style>
</head>
<body>

    <div class="glass-panel search-container">
        <input type="text" id="searchInput" class="search-input" placeholder="歌名,歌手..." autocomplete="off">
        <button onclick="searchLyrics()" class="search-btn">搜尋</button>
    </div>

    <div class="glass-panel main-display">
        <div class="live-preview-top">
            <img src="Spotify.png" alt="Spotify" class="spotify-logo">
            <div class="live-tag">Live Sync Off</div>
        </div>
        
        <div id="lyricsViewport" class="lyrics-viewport">
            <div id="loader" class="loader">
                <span></span><span></span><span></span><span></span>
            </div>
            <div id="statusMsg" class="status-msg">輸入歌名，開啟視覺與聽覺的連結</div>
        </div>
    </div>

    <div class="mode-bar">
        <div class="mode-item active">歌詞搜尋</div>
        <div class="mode-item disabled">
            Spotify Live
            <span class="coming-soon">COMING SOON</span>
        </div>
    </div>

    <script>
        document.getElementById("searchInput").addEventListener("keypress", (e) => {
            if (e.key === "Enter") searchLyrics();
        });

        async function searchLyrics() {
            const query = document.getElementById('searchInput').value.trim();
            const viewport = document.getElementById('lyricsViewport');
            const loader = document.getElementById('loader');
            const statusMsg = document.getElementById('statusMsg');
            
            if (!query) return;

            // 顯示載入動畫
            statusMsg.style.display = 'none';
            viewport.querySelectorAll('.lyric-line').forEach(el => el.remove());
            loader.style.display = 'flex';

            try {
                const response = await fetch(`https://lyrics-back.vercel.app/api/get?track_name=${encodeURIComponent(query)}`);
                const data = await response.json();

                loader.style.display = 'none';

                if (data.status === "success" && data.syncedLyrics) {
                    let html = "";
                    data.syncedLyrics.forEach(line => {
                        const match = line.match(/^(\[\d{2}:\d{2}\.\d{2,3}\])(.*)/);
                        if (match) {
                            const time = match[1];
                            const text = match[2].trim();
                            if(text) html += `<div class="lyric-line" data-time="${time}">${text}</div>`;
                        } else if(line.trim()) {
                            html += `<div class="lyric-line">${line}</div>`;
                        }
                    });
                    viewport.innerHTML = html;
                    viewport.scrollTop = 0;
                } else {
                    statusMsg.style.display = 'block';
                    statusMsg.innerText = "找不到該曲目，請精準輸入：歌名,歌手";
                }
            } catch (error) {
                loader.style.display = 'none';
                statusMsg.style.display = 'block';
                statusMsg.innerText = "連線失敗，請檢查後端服務。";
            }
        }
    </script>
</body>
</html>
