<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Get Lyrics</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; 
            background: linear-gradient(145deg, #0b0e11 0%, #1a1d23 100%);
            height: 100vh; color: #ffffff; display: flex; flex-direction: column; 
            align-items: center; overflow: hidden; padding: 20px 15px;
        }
        .glass-panel {
            background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 24px;
            width: 100%; max-width: 480px; box-shadow: 0 20px 40px rgba(0, 0, 0, 0.6);
        }
        .top-section { margin-bottom: 16px; }
        .search-container { padding: 10px; display: flex; gap: 10px; }
        .search-input {
            flex: 1; background: rgba(0, 0, 0, 0.4); border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px; padding: 14px 18px; color: white; outline: none;
        }
        .search-btn {
            background: #1db954; color: white; border: none; border-radius: 16px;
            padding: 0 24px; font-weight: 700; cursor: pointer;
        }
        #downloadBtn {
            display: none; width: calc(100% - 20px); margin: 0 10px 10px 10px; padding: 10px;
            background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(29, 185, 84, 0.3);
            border-radius: 12px; color: #1db954; font-size: 13px; font-weight: 700; cursor: pointer; text-align: center;
        }
        .main-display { flex: 1; display: flex; flex-direction: column; overflow: hidden; margin-bottom: 20px; }
        .song-info-header {
            display: flex; width: 100%; height: 50px; background: rgba(255, 255, 255, 0.05);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }
        .song-title-display, .song-artist-display {
            flex: 1; display: flex; align-items: center; justify-content: center;
            padding: 0 15px; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }
        .song-title-display { font-size: 15px; border-right: 1px solid rgba(255, 255, 255, 0.1); }
        .song-artist-display { font-size: 13px; color: rgba(255, 255, 255, 0.5); }
        .lyrics-viewport { flex: 1; overflow-y: auto; padding: 20px; text-align: center; }
        .lyric-line { font-size: 18px; line-height: 2.2; margin-bottom: 15px; color: rgba(255, 255, 255, 0.8); }
        .loader { display: none; justify-content: center; gap: 6px; margin-top: 50px; }
        .loader span { width: 4px; height: 20px; background: #1db954; animation: load 1s infinite ease-in-out; }
        @keyframes load { 0%, 100% { transform: scaleY(0.4); } 50% { transform: scaleY(1.2); } }
    </style>
</head>
<body>

    <div class="glass-panel top-section">
        <div class="search-container">
            <input type="text" id="searchInput" class="search-input" placeholder="搜尋：歌名,歌手">
            <button onclick="searchLyrics()" class="search-btn">搜尋</button>
        </div>
        <div id="downloadBtn" onclick="downloadTxt()">📥 下載歌詞 (.txt)</div>
    </div>

    <div class="glass-panel main-display">
        <div class="song-info-header">
            <div id="displayTitle" class="song-title-display">準備就緒</div>
            <div id="displayArtist" class="song-artist-display">---</div>
        </div>
        <div id="lyricsViewport" class="lyrics-viewport">
            <div id="loader" class="loader"><span></span><span></span><span></span><span></span></div>
            <div id="lyricsContainer"></div>
        </div>
    </div>

    <script>
        let currentLyricsText = "", currentSongTitle = "", currentArtistName = "";

        async function searchLyrics() {
            const query = document.getElementById('searchInput').value.trim();
            if (!query) return;

            const container = document.getElementById('lyricsContainer');
            const loader = document.getElementById('loader');
            const dlBtn = document.getElementById('downloadBtn');
            
            container.innerHTML = "";
            loader.style.display = 'flex';
            dlBtn.style.display = 'none';

            try {
                // 指向你的 API
                const response = await fetch(`https://lyrics-server-sigma.vercel.app/api/get?track_name=${encodeURIComponent(query)}`);
                const data = await response.json();

                loader.style.display = 'none';
                if (data.status === "success" && data.syncedLyrics) {
                    currentSongTitle = data.title || "未知歌名";
                    currentArtistName = data.artist || "未知歌手";
                    
                    document.getElementById('displayTitle').textContent = currentSongTitle;
                    document.getElementById('displayArtist').textContent = currentArtistName;

                    let lyrics = "";
                    data.syncedLyrics.forEach(line => {
                        const clean = line.replace(/\[\d{2}:\d{2}\.\d{2,3}\]/g, "").trim();
                        if(clean) {
                            lyrics += clean + "\n";
                            container.innerHTML += `<div class="lyric-line">${clean}</div>`;
                        }
                    });
                    currentLyricsText = lyrics;
                    dlBtn.style.display = 'block';
                } else {
                    container.innerHTML = `<div class="lyric-line">找不到歌詞...</div>`;
                }
            } catch (e) {
                loader.style.display = 'none';
                container.innerHTML = `<div class="lyric-line">連線錯誤，請重試。</div>`;
            }
        }

        function downloadTxt() {
            const blob = new Blob(['\ufeff' + currentLyricsText], { type: 'text/plain;charset=utf-8' });
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = `${currentArtistName} - ${currentSongTitle}.txt`;
            a.click();
        }
    </script>
</body>
</html>
