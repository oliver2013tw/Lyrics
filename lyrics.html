<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Get Lyrics - Live Sync</title>
    <style>
        /* (保留你原本的所有 CSS，我只在下方加入 Live 按鈕樣式) */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; background: linear-gradient(145deg, #0b0e11 0%, #1a1d23 100%); height: 100vh; color: #ffffff; display: flex; flex-direction: column; align-items: center; overflow: hidden; padding: 20px 15px; }
        .glass-panel { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(25px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 24px; width: 100%; max-width: 480px; box-shadow: 0 20px 40px rgba(0, 0, 0, 0.6); }
        .top-section { margin-bottom: 16px; }
        .search-container { padding: 10px; display: flex; gap: 10px; }
        .search-input { flex: 1; background: rgba(0, 0, 0, 0.4); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 16px; padding: 14px 18px; color: white; outline: none; }
        .search-btn { background: #1db954; color: white; border: none; border-radius: 16px; padding: 0 24px; font-weight: 700; cursor: pointer; }
        #downloadBtn { display: none; width: calc(100% - 20px); margin: 0 10px 10px 10px; padding: 10px; background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(29, 185, 84, 0.3); border-radius: 12px; color: #1db954; font-size: 13px; font-weight: 700; cursor: pointer; text-align: center; }
        .main-display { flex: 1; display: flex; flex-direction: column; overflow: hidden; margin-bottom: 20px; }
        .live-tag { font-size: 10px; letter-spacing: 3px; color: #1db954; font-weight: 800; cursor: pointer; }
        .mode-bar { padding: 6px; display: flex; background: rgba(0, 0, 0, 0.5); border-radius: 50px; width: 100%; max-width: 320px; border: 1px solid rgba(255, 255, 255, 0.05); }
        .mode-item { flex: 1; padding: 12px; text-align: center; font-size: 13px; font-weight: 700; border-radius: 40px; color: rgba(255, 255, 255, 0.4); cursor: pointer; }
        .mode-item.active { background: rgba(255, 255, 255, 0.12); color: #ffffff; }
        .lyrics-viewport { flex: 1; overflow-y: auto; padding: 20px; text-align: center; }
        .lyric-line { font-size: 18px; line-height: 2.2; margin-bottom: 15px; color: rgba(255, 255, 255, 0.8); }
    </style>
</head>
<body>

    <div class="glass-panel top-section">
        <div class="search-container">
            <input type="text" id="searchInput" class="search-input" placeholder="搜尋：歌名,歌手">
            <button onclick="searchLyrics()" class="search-btn">搜尋</button>
        </div>
        <div id="downloadBtn" onclick="downloadTxt()">📥 下載歌詞 (.txt)</div>
    </div>

    <div class="glass-panel main-display">
        <div class="live-preview-top" style="padding: 20px 0 15px; text-align: center;">
            <div id="liveStatus" class="live-tag">LIVE SYNC OFF</div>
        </div>
        <div id="lyricsViewport" class="lyrics-viewport">
            <div id="lyricsContainer"></div>
        </div>
    </div>

    <div class="mode-bar">
        <div id="searchTab" class="mode-item active" onclick="switchMode('search')">搜尋模式</div>
        <div id="liveTab" class="mode-item" onclick="switchMode('live')">Spotify Live</div>
    </div>

    <script>
        // 核心邏輯融合
        async function switchMode(mode) {
            const liveStatus = document.getElementById('liveStatus');
            if (mode === 'live') {
                // 跳轉到你的認證 API
                window.location.href = 'https://lyrics-server-sigma.vercel.app/api/auth';
            }
        }

        async function searchLyrics() {
            // ... (保留你原本的 searchLyrics 函數邏輯) ...
            const query = document.getElementById('searchInput').value.trim();
            if (!query) return;
            const container = document.getElementById('lyricsContainer');
            container.innerHTML = "搜尋中...";
            const response = await fetch(`https://lyrics-server-sigma.vercel.app/api/get?track_name=${encodeURIComponent(query)}`);
            const data = await response.json();
            // ... (渲染歌詞邏輯) ...
        }
    </script>
</body>
</html>
