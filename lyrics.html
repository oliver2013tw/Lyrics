<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>歌詞搜尋器</title>
    <style>
        * { box-sizing: border-box; }
        body { margin: 0; padding: 15px; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; }
        .search-area { width: 100%; max-width: 500px; display: flex; gap: 5px; }
        input { flex: 1; padding: 12px; border: 1px solid #ccc; border-radius: 4px; }
        button { padding: 10px 20px; background: #28a745; color: white; border: none; border-radius: 4px; }
        #lyrics { width: 100%; max-width: 500px; margin-top: 20px; white-space: pre-line; line-height: 1.6; color: #333; }
    </style>
</head>
<body>
    <div class="search-area">
        <input type="text" id="searchInput" placeholder="例如: Yellow,Coldplay">
        <button onclick="searchLyrics()">搜尋</button>
    </div>

    <div id="lyrics">按下搜尋開始...</div>

    <script>
        async function searchLyrics() {
            const query = document.getElementById('searchInput').value;
            const lyricsDiv = document.getElementById('lyrics');
            if(!query) return;
            
            lyricsDiv.innerText = "搜尋中...";
            try {
                const response = await fetch(`https://lyrics-back.vercel.app/api/get?track_name=${encodeURIComponent(query)}`);
                const data = await response.json();
                lyricsDiv.innerText = data.syncedLyrics ? data.syncedLyrics.join('\n') : "找不到歌詞";
            } catch (e) {
                lyricsDiv.innerText = "連線失敗，請檢查網路。";
            }
        }
    </script>
</body>
</html>
