<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>歌詞搜尋器</title>
    <style>
        body { background: #121212; color: #e0e0e0; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .search-box { width: 100%; max-width: 500px; display: flex; gap: 10px; margin-bottom: 20px; }
        input { flex: 1; padding: 12px; border-radius: 8px; border: none; background: #333; color: white; }
        button { padding: 10px 20px; border-radius: 8px; border: none; background: #1db954; color: white; cursor: pointer; }
        #lyrics { width: 100%; max-width: 500px; height: 60vh; overflow-y: auto; padding: 20px; background: #1e1e1e; border-radius: 12px; line-height: 2; text-align: center; }
    </style>
</head>
<body>
    <div class="search-box">
        <input type="text" id="searchInput" placeholder="歌名,歌手...">
        <button onclick="searchLyrics()">搜尋</button>
    </div>
    <div id="lyrics">歌詞將顯示於此...</div>

    <script>
        async function searchLyrics() {
            const query = document.getElementById('searchInput').value;
            const div = document.getElementById('lyrics');
            div.innerText = "搜尋中...";
            try {
                const res = await fetch(`https://lyrics-back.vercel.app/api/get?track_name=${encodeURIComponent(query)}`);
                const data = await res.json();
                div.innerHTML = data.syncedLyrics ? data.syncedLyrics.join('<br>') : "找不到歌詞";
            } catch(e) { div.innerText = "連線失敗"; }
        }
    </script>
</body>
</html>
