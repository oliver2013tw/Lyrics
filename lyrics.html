<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Get Lyrics</title>
    <style>
        /* 基礎重置與防過度捲動 (App-like 體驗) */
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        html, body {
            height: 100%;
            height: 100dvh; /* 適配移動端瀏覽器工具列 */
            width: 100vw;
            overflow: hidden; /* 防止整個頁面捲動 */
            overscroll-behavior-y: none; /* 禁用橡皮筋效應 */
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: linear-gradient(135deg, #090b0f 0%, #15181e 100%);
            color: #ffffff;
            display: flex;
            flex-direction: column;
        }

        /* 膠囊提示框 (Capsule Toast) */
        #toast {
            position: fixed;
            top: -100px; /* 隱藏狀態 */
            left: 50%;
            transform: translateX(-50%);
            background: rgba(29, 185, 84, 0.9);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            color: #fff;
            padding: 12px 28px;
            border-radius: 50px;
            font-size: 14px;
            font-weight: 600;
            letter-spacing: 0.5px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.4);
            z-index: 9999;
            transition: top 0.5s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            white-space: nowrap;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        #toast.error { background: rgba(226, 33, 52, 0.95); }

        /* 主內容區 (允許內部捲動) */
        .main-content {
            flex: 1;
            width: 100%;
            max-width: 600px;
            margin: 0 auto;
            overflow-y: auto;
            overflow-x: hidden;
            padding: 20px 20px 100px 20px; /* 底部留白給導航列 */
            scroll-behavior: smooth;
        }
        .main-content::-webkit-scrollbar { display: none; } /* 隱藏捲軸保持美觀 */

        /* 視圖切換 */
        .view-section { display: none; animation: fadeIn 0.4s ease forwards; }
        .view-section.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* 玻璃面板共用樣式 */
        .glass-panel {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 24px;
            padding: 20px;
            margin-bottom: 16px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }

        /* 搜尋區塊 UI */
        .search-box { display: flex; gap: 10px; margin-bottom: 15px; }
        .search-input {
            flex: 1; background: rgba(0, 0, 0, 0.3); border: 1px solid rgba(255,255,255,0.1);
            border-radius: 50px; padding: 14px 20px; color: white; font-size: 15px; outline: none; transition: 0.3s;
        }
        .search-input:focus { border-color: #1db954; background: rgba(0,0,0,0.5); }
        .btn-primary {
            background: #1db954; color: white; border: none; border-radius: 50px;
            padding: 0 24px; font-weight: 700; font-size: 15px; cursor: pointer; transition: transform 0.2s;
        }
        .btn-primary:active { transform: scale(0.95); }

        /* 歌詞呈現區 */
        .lyrics-container { text-align: center; margin-top: 20px; }
        .song-title { font-size: 22px; font-weight: 800; margin-bottom: 4px; color: #fff; }
        .song-artist { font-size: 14px; color: rgba(255,255,255,0.6); margin-bottom: 25px; }
        .lyric-line { font-size: 18px; line-height: 2.4; margin-bottom: 15px; color: rgba(255,255,255,0.85); transition: 0.3s; }

        /* Live 模式專屬 UI */
        .live-auth-state { text-align: center; padding: 40px 10px; }
        .spotify-icon { width: 60px; height: 60px; margin-bottom: 20px; filter: drop-shadow(0 4px 10px rgba(29,185,84,0.4)); }
        .connect-btn { background: #1db954; color: black; border-radius: 50px; padding: 15px 30px; font-size: 16px; font-weight: 800; border: none; cursor: pointer; margin-top: 20px; width: 100%; box-shadow: 0 8px 20px rgba(29,185,84,0.3); transition: 0.2s; }
        .connect-btn:active { transform: scale(0.96); }
        .live-player { display: none; text-align: center; } /* 登入後顯示 */
        
        /* 底部導航列 (Bottom Nav) */
        .bottom-nav {
            position: fixed;
            bottom: 25px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(15, 15, 15, 0.75);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 50px;
            display: flex;
            padding: 6px;
            width: 90%;
            max-width: 360px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.6);
            z-index: 1000;
        }
        .nav-item {
            flex: 1; padding: 12px 0; text-align: center; font-size: 14px; font-weight: 700;
            color: rgba(255,255,255,0.5); border-radius: 40px; cursor: pointer; transition: all 0.3s ease;
        }
        .nav-item.active { background: rgba(255,255,255,0.12); color: #fff; }

        /* 載入動畫 */
        .loader { display: none; justify-content: center; gap: 6px; padding: 30px 0; }
        .loader span { width: 4px; height: 16px; background: #1db954; border-radius: 10px; animation: load 1s infinite ease-in-out; }
        .loader span:nth-child(2) { animation-delay: 0.1s; }
        .loader span:nth-child(3) { animation-delay: 0.2s; }
        @keyframes load { 0%, 100% { transform: scaleY(0.4); } 50% { transform: scaleY(1.2); } }
    </style>
</head>
<body>

    <div id="toast">提示訊息</div>

    <div class="main-content">
        <div id="view-search" class="view-section active">
            <div class="glass-panel">
                <div class="search-box">
                    <input type="text" id="searchInput" class="search-input" placeholder="輸入歌名或歌手...">
                    <button class="btn-primary" onclick="executeSearch()">搜尋</button>
                </div>
            </div>
            
            <div class="glass-panel" id="search-results" style="display: none; min-height: 50vh;">
                <div class="lyrics-container">
                    <div id="search-title" class="song-title"></div>
                    <div id="search-artist" class="song-artist"></div>
                    <div id="search-loader" class="loader"><span></span><span></span><span></span></div>
                    <div id="search-lyrics-content"></div>
                </div>
            </div>
        </div>

        <div id="view-live" class="view-section">
            <div class="glass-panel">
                <div id="live-auth-state" class="live-auth-state">
                    <svg class="spotify-icon" viewBox="0 0 24 24" fill="#1db954"><path d="M12 0C5.4 0 0 5.4 0 12s5.4 12 12 12 12-5.4 12-12S18.66 0 12 0zm5.521 17.34c-.24.359-.66.48-1.021.24-2.82-1.74-6.36-2.101-10.561-1.141-.418.122-.779-.179-.899-.539-.12-.421.18-.78.54-.9 4.56-1.021 8.52-.6 11.64 1.32.36.18.48.66.301 1.02zm1.44-3.3c-.301.42-.84.6-1.262.3-3.239-1.98-8.159-2.58-11.939-1.38-.479.12-1.02-.12-1.14-.6-.12-.48.12-1.021.6-1.141C9.6 9.9 15 10.561 18.72 12.84c.36.181.54.78.241 1.2zm.12-3.36C15.24 8.4 8.82 8.16 5.16 9.301c-.6.179-1.2-.181-1.38-.721-.18-.6.18-1.2.72-1.38 4.2-1.26 11.28-1.02 15.721 1.621.539.3.719 1.02.419 1.56-.299.48-1.02.66-1.559.3z"/></svg>
                    <h2 style="margin-bottom: 10px;">Spotify Live 同步</h2>
                    <p style="color: rgba(255,255,255,0.6); font-size: 14px; line-height: 1.6;">連接你的 Spotify 帳戶，<br>享受自動跟隨播放進度的沉浸式歌詞。</p>
                    <button class="connect-btn" onclick="connectSpotify()">連結 Spotify</button>
                </div>

                <div id="live-player-state" class="live-player">
                    <div class="song-title">等待播放中...</div>
                    <div class="song-artist">請在 Spotify 開始播放音樂</div>
                    <div class="loader" id="live-loader" style="display: flex;"><span></span><span></span><span></span></div>
                    </div>
            </div>
        </div>
    </div>

    <div class="bottom-nav">
        <div id="tab-search" class="nav-item active" onclick="switchView('search')">🔍 搜尋歌詞</div>
        <div id="tab-live" class="nav-item" onclick="switchView('live')">🎧 Live 模式</div>
    </div>

    <script>
        // --- UI 交互與膠囊提示 ---
        let toastTimer;
        function showToast(message, type = 'success') {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            
            // 根據類型切換顏色
            if(type === 'error') {
                toast.classList.add('error');
            } else {
                toast.classList.remove('error');
            }

            // 動畫滑出
            toast.style.top = '30px';
            
            clearTimeout(toastTimer);
            toastTimer = setTimeout(() => {
                toast.style.top = '-100px'; // 3 秒後收回
            }, 3000);
        }

        function switchView(viewName) {
            // 切換按鈕狀態
            document.getElementById('tab-search').classList.toggle('active', viewName === 'search');
            document.getElementById('tab-live').classList.toggle('active', viewName === 'live');
            
            // 切換視圖
            document.getElementById('view-search').classList.toggle('active', viewName === 'search');
            document.getElementById('view-live').classList.toggle('active', viewName === 'live');
        }

        // --- 搜尋模式邏輯 (直連 LRCLib) ---
        document.getElementById("searchInput").addEventListener("keypress", (e) => {
            if (e.key === "Enter") executeSearch();
        });

        async function executeSearch() {
            const query = document.getElementById('searchInput').value.trim();
            if (!query) {
                showToast('請輸入歌名或歌手', 'error');
                return;
            }

            document.getElementById('search-results').style.display = 'block';
            document.getElementById('search-loader').style.display = 'flex';
            document.getElementById('search-lyrics-content').innerHTML = '';
            document.getElementById('search-title').textContent = '搜尋中...';
            document.getElementById('search-artist').textContent = '';

            try {
                const res = await fetch(`https://lrclib.net/api/search?q=${encodeURIComponent(query)}`);
                const data = await res.json();
                document.getElementById('search-loader').style.display = 'none';

                if (data && data.length > 0) {
                    const track = data[0];
                    document.getElementById('search-title').textContent = track.trackName;
                    document.getElementById('search-artist').textContent = track.artistName;
                    
                    const lyrics = track.syncedLyrics || track.plainLyrics;
                    if(lyrics) {
                        let html = "";
                        lyrics.split('\n').forEach(line => {
                            const text = line.replace(/\[\d{2}:\d{2}\.\d{2,3}\]/g, "").trim();
                            if(text) html += `<div class="lyric-line">${text}</div>`;
                        });
                        document.getElementById('search-lyrics-content').innerHTML = html;
                        showToast('成功獲取歌詞！', 'success');
                    } else {
                        document.getElementById('search-lyrics-content').innerHTML = '<div class="lyric-line">這首歌暫無歌詞</div>';
                        showToast('找不到這首歌的歌詞', 'error');
                    }
                } else {
                    document.getElementById('search-title').textContent = '無結果';
                    showToast('找不到相關歌曲', 'error');
                }
            } catch (err) {
                document.getElementById('search-loader').style.display = 'none';
                showToast('網路連線錯誤', 'error');
            }
        }

        // --- Live 模式邏輯 (Spotify OAuth & Premium 攔截) ---
        function connectSpotify() {
            showToast('正在前往 Spotify 授權...', 'success');
            setTimeout(() => {
                // 跳轉至你的 Vercel 後端進行授權
                window.location.href = 'https://lyrics-server-sigma.vercel.app/api/auth';
            }, 800);
        }

        // 頁面載入時檢查 URL 是否帶有登入回傳的 Token
        window.onload = () => {
            const urlParams = new URLSearchParams(window.location.search);
            // 假設你的 callback 會把 token 放在 URL 參數 ?token= 或 ?access_token=
            const token = urlParams.get('token') || urlParams.get('access_token');

            if (token) {
                // 1. 清理網址列，避免 token 外洩或重新整理導致重複觸發
                window.history.replaceState({}, document.title, window.location.pathname);
                
                // 2. 切換到 Live 視圖
                switchView('live');
                
                // 3. 驗證 Premium 帳號
                verifyPremiumUser(token);
            }
        };

        async function verifyPremiumUser(token) {
            showToast('驗證 Spotify 帳戶狀態中...', 'success');
            try {
                // 直接使用 Spotify 官方 API 查詢使用者資料
                const res = await fetch('https://api.spotify.com/v1/me', {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                
                if (!res.ok) throw new Error('Token 無效或過期');
                
                const userData = await res.json();

                // 核心防線：檢查產品級別
                if (userData.product !== 'premium') {
                    // 如果不是 Premium -> 顯示紅色膠囊 -> 退回搜尋模式
                    showToast('需要 Spotify Premium 帳戶才能使用 Live 功能', 'error');
                    setTimeout(() => {
                        switchView('search');
                    }, 2000); // 讓使用者看清楚提示後切回
                } else {
                    // 是 Premium -> 顯示成功 -> 切換到播放器介面
                    showToast(`歡迎回來，${userData.display_name}！`, 'success');
                    document.getElementById('live-auth-state').style.display = 'none';
                    document.getElementById('live-player-state').style.display = 'block';
                    
                    // 這裡可以開始呼叫你的 /api/now-playing 去同步歌詞了
                    // startLiveSync(token);
                }
            } catch (error) {
                showToast('驗證失敗，請重新登入', 'error');
                switchView('search');
            }
        }
    </script>
</body>
</html>
