<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>歌詞搜尋 | Premium Experience</title>
    <style>
        /* 全局重置 */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body { 
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; 
            background: linear-gradient(145deg, #0b0e11 0%, #1a1d23 100%);
            background-attachment: fixed;
            color: #ffffff; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            height: 100vh;
            overflow: hidden; /* 防止主頁面捲動 */
            padding: 20px 15px;
        }

        /* 液態玻璃卡片基礎樣式 */
        .glass-panel {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 24px;
            width: 100%;
            max-width: 480px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5);
        }

        /* 頂部導覽 */
        .nav-back {
            text-decoration: none;
            color: rgba(255, 255, 255, 0.5);
            font-size: 14px;
            margin-bottom: 15px;
            transition: 0.3s;
        }
        .nav-back:hover { color: #1db954; }

        /* 搜尋區塊 */
        .search-container {
            padding: 12px;
            display: flex;
            gap: 10px;
            margin-bottom: 16px;
        }
        .search-input {
            flex: 1;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 14px;
            padding: 12px 16px;
            color: white;
            font-size: 15px;
            outline: none;
            transition: all 0.3s ease;
        }
        .search-input:focus {
            border-color: #1db954;
            background: rgba(0, 0, 0, 0.5);
            box-shadow: 0 0 15px rgba(29, 185, 84, 0.2);
        }
        .search-btn {
            background: #1db954;
            color: white;
            border: none;
            border-radius: 14px;
            padding: 0 20px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
        }
        .search-btn:active { transform: scale(0.95); }

        /* 歌詞主體區塊 */
        .main-display {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            margin-bottom: 20px;
        }

        /* Live 模式預留頂部 (含 Logo) */
        .live-header {
            padding: 15px 0;
            text-align: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            display: none; /* 預設隱藏，切換模式時可用 */
        }
        .spotify-logo {
            height: 24px;
            object-fit: contain;
            filter: drop-shadow(0 2px 4px rgba(0,0,0,0.5));
        }

        .lyrics-viewport {
            flex: 1;
            overflow-y: auto;
            padding: 30px 20px;
            text-align: center;
            overscroll-behavior: contain; /* 防止拉動網頁 */
            scroll-behavior: smooth;
        }

        /* 隱藏捲軸 */
        .lyrics-viewport::-webkit-scrollbar { width: 4px; }
        .lyrics-viewport::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 10px; }

        .lyric-line {
            font-size: 18px;
            line-height: 2.2;
            margin-bottom: 12px;
            color: rgba(255, 255, 255, 0.6);
            transition: all 0.4s ease;
            cursor: default;
        }
        .lyric-line.active {
            color: #ffffff;
            font-weight: 600;
            transform: scale(1.05);
            text-shadow: 0 0 20px rgba(255,255,255,0.3);
        }

        /* 底部模式切換 */
        .mode-bar {
            padding: 6px;
            display: flex;
            background: rgba(0, 0, 0, 0.4);
            border-radius: 50px;
            width: 100%;
            max-width: 350px;
        }
        .mode-item {
            flex: 1;
            padding: 10px;
            text-align: center;
            font-size: 13px;
            font-weight: 600;
            border-radius: 40px;
            cursor: pointer;
            transition: 0.3s;
            color: rgba(255, 255, 255, 0.4);
        }
        .mode-item.active {
            background: rgba(255, 255, 255, 0.1);
            color: #ffffff;
        }
        .mode-item.disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }

        /* 訊息提示 */
        .status-msg {
            color: rgba(255, 255, 255, 0.4);
            margin-top: 40%;
            font-size: 15px;
        }
    </style>
</head>
<body>

    <a href="index.html" class="nav-back">← 返回</a>

    <div class="glass-panel search-container">
        <input type="text" id="searchInput" class="search-input" placeholder="輸入：歌名,歌手" autocomplete="off">
        <button onclick="searchLyrics()" class="search-btn">搜尋</button>
    </div>

    <div class="glass-panel main-display">
        <div id="liveHeader" class="live-header">
            <img src="Spotify.png" alt="Spotify" class="spotify-logo">
        </div>
        
        <div id="lyricsViewport" class="lyrics-viewport">
            <div class="status-msg">請輸入歌名開始同步</div>
        </div>
    </div>

    <div class="mode-bar">
        <div class="mode-item active">搜尋模式</div>
        <div class="mode-item disabled" title="即將推出">Spotify Live</div>
    </div>

    <script>
        // 支援鍵盤 Enter 搜尋
        document.getElementById("searchInput").addEventListener("keypress", (e) => {
            if (e.key === "Enter") searchLyrics();
        });

        async function searchLyrics() {
            const query = document.getElementById('searchInput').value.trim();
            const viewport = document.getElementById('lyricsViewport');
            
            if (!query) return;

            viewport.innerHTML = '<div class="status-msg" style="color:#1db954">正在讀取雲端歌詞...</div>';

            try {
                // 串接你的 Vercel 後端 API
                const response = await fetch(`https://lyrics-back.vercel.app/api/get?track_name=${encodeURIComponent(query)}`);
                const data = await response.json();

                if (data.status === "success" && data.syncedLyrics) {
                    let html = "";
                    data.syncedLyrics.forEach(line => {
                        // 正則表達式抓取時間戳
                        const match = line.match(/^(\[\d{2}:\d{2}\.\d{2,3}\])(.*)/);
                        
                        if (match) {
                            const time = match[1];     // 時間戳
                            const text = match[2].trim(); // 純歌詞文字
                            
                            if(text) {
                                // 時間標籤存入 data-time，畫面不顯示
                                html += `<div class="lyric-line" data-time="${time}">${text}</div>`;
                            }
                        } else if(line.trim()) {
                            html += `<div class="lyric-line">${line}</div>`;
                        }
                    });
                    viewport.innerHTML = html;
                    viewport.scrollTop = 0; // 搜尋後回到最頂端
                } else {
                    viewport.innerHTML = '<div class="status-msg">😢 找不到歌詞，請嘗試換個歌名</div>';
                }
            } catch (error) {
                viewport.innerHTML = '<div class="status-msg">⚠️ 連線失敗，請檢查後端 API</div>';
            }
        }
    </script>
</body>
</html>
