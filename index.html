<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { background: #050505; color: white; font-family: sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        .header { padding: 20px; background: rgba(0,0,0,0.8); backdrop-filter: blur(10px); }
        input { width: 100%; padding: 15px; border-radius: 10px; background: #222; border: none; color: white; }
        #lyrics-container { flex: 1; overflow-y: auto; padding: 0 20px; text-align: center; display: flex; flex-direction: column; align-items: center; }
        .lyric-line { padding: 20px 0; color: rgba(255,255,255,0.3); transition: 0.3s; font-size: 1.5rem; }
        .lyric-line.active { color: white; transform: scale(1.1); font-weight: bold; }
    </style>
</head>
<body>
    <div class="header">
        <input type="text" id="search" placeholder="搜尋歌曲...">
    </div>
    <div id="lyrics-container"></div>

    <script>
        let lyrics = [];
        const container = document.getElementById('lyrics-container');

        document.getElementById('search').onkeypress = async (e) => {
            if(e.key === 'Enter') {
                const res = await fetch(`/api/get?track_name=${e.target.value}&artist_name=`);
                const data = await res.json();
                lyrics = parseLRC(data.syncedLyrics);
                render(lyrics);
                startSync(data.progress_ms);
            }
        };

        function parseLRC(raw) {
            return raw.split('\n').map(l => {
                const m = l.match(/\[(\d{2}):(\d{2}\.\d{2})\](.*)/);
                return m ? { time: parseInt(m[1])*60 + parseFloat(m[2]), text: m[3] } : null;
            }).filter(i => i);
        }

        function render(data) {
            container.innerHTML = data.map((l, i) => `<div class="lyric-line" id="line-${i}">${l.text}</div>`).join('');
        }

        function startSync(startMs) {
            let startTime = Date.now() - startMs;
            setInterval(() => {
                const now = (Date.now() - startTime) / 1000;
                lyrics.forEach((l, i) => {
                    if(now >= l.time) {
                        document.querySelectorAll('.lyric-line').forEach(el => el.classList.remove('active'));
                        const el = document.getElementById(`line-${i}`);
                        el.classList.add('active');
                        el.scrollIntoView({ behavior: 'smooth', block: 'center' });
                    }
                });
            }, 500);
        }
    </script>
</body>
</html>
