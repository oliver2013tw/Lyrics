<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Spotify Live Lyrics</title>
    <style>
        /* =========================================
           1. Design Tokens (CSS 變數系統)
        ========================================= */
        :root {
            --color-bg: #000000;
            --color-surface: rgba(15, 15, 15, 0.75);
            --color-primary: #1DB954;
            --color-text-primary: #ffffff;
            --color-text-secondary: rgba(255, 255, 255, 0.4);
            --color-error: #FF453A;
            
            --glass-blur: blur(25px);
            --radius-lg: 20px;
            --radius-md: 12px;
            
            /* 安全區域適配 */
            --safe-top: env(safe-area-inset-top, 20px);
            --safe-bottom: env(safe-area-inset-bottom, 20px);
        }

        /* =========================================
           2. 基礎重置與 App 級別佈局
        ========================================= */
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        
        body {
            background-color: var(--color-bg);
            color: var(--color-text-primary);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            /* 使用 dvh 解決手機瀏覽器網址列伸縮與鍵盤彈出問題 */
            height: 100vh; height: 100dvh; 
            display: flex;
            flex-direction: column;
            overflow: hidden;
            overscroll-behavior: none;
        }

        /* 動態模糊背景 */
        #app-bg {
            position: fixed; inset: -10%; width: 120%; height: 120%;
            background-size: cover; background-position: center;
            filter: blur(60px) brightness(0.3);
            z-index: -1; transition: background-image 1.2s ease-in-out;
        }

        /* =========================================
           3. 頂部狀態列 (Header / App Bar)
        ========================================= */
        .top-bar {
            padding-top: calc(var(--safe-top) + 10px);
            background: var(--color-surface);
            backdrop-filter: var(--glass-blur);
            -webkit-backdrop-filter: var(--glass-blur);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            z-index: 10;
            position: relative;
            flex-shrink: 0;
            min-height: calc(var(--safe-top) + 70px);
        }

        .header-content {
            padding: 0 20px 15px;
            max-width: 600px;
            margin: 0 auto;
            position: relative;
        }

        /* 視圖切換容器 */
        .view-header { display: none; animation: fadeIn 0.3s ease forwards; }
        .view-header.active { display: block; }

        /* 搜尋輸入框 */
        .search-input-wrapper input {
            width: 100%; padding: 12px 16px; border-radius: var(--radius-md);
            background: rgba(255, 255, 255, 0.1); border: 1px solid transparent;
            color: white; font-size: 16px; outline: none; transition: 0.3s;
        }
        .search-input-wrapper input:focus {
            background: rgba(255, 255, 255, 0.15); border-color: var(--color-primary);
        }

        /* 播放狀態卡片 */
        .now-playing { display: flex; align-items: center; gap: 12px; }
        .now-playing img { width: 44px; height: 44px; border-radius: 8px; object-fit: cover; }
        .track-info { flex: 1; overflow: hidden; }
        .track-info h4 { font-size: 15px; margin-bottom: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .track-info p { font-size: 13px; color: var(--color-primary); font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        
        /* 隱藏式進度條 (貼齊 Header 底部邊緣) */
        .progress-bar-container {
            position: absolute; bottom: 0; left: 0; width: 100%; height: 2px;
            background: transparent;
        }
        .progress-bar-fill { height: 100%; width: 0%; background: var(--color-primary); transition: width 0.1s linear; }

        /* =========================================
           4. 歌詞顯示區 (Main Content)
        ========================================= */
        #lyrics-viewport {
            flex: 1; width: 100%; overflow-y: auto; -webkit-overflow-scrolling: touch;
            padding: 0 24px; display: flex; flex-direction: column;
            scroll-behavior: smooth;
        }
        #lyrics-viewport::before, #lyrics-viewport::after { content: ""; display: block; min-height: 35vh; flex-shrink: 0; }

        .lrc-line {
            width: 100%; max-width: 600px; margin: 0 auto; padding: 18px 0;
            font-size: clamp(1.4rem, 5vw, 2.2rem); font-weight: 800; line-height: 1.4;
            color: var(--color-text-secondary); text-align: left;
            transition: all 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94); transform-origin: left center; cursor: pointer;
        }
        .lrc-line.active { color: var(--color-text-primary); transform: scale(1.05); }

        .empty-state {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            text-align: center; color: var(--color-text-secondary); width: 100%; pointer-events: none;
        }
        .empty-state svg { width: 48px; height: 48px; opacity: 0.5; margin-bottom: 12px; }

        /* =========================================
           5. 底部導航列 (Bottom Tab Bar)
        ========================================= */
        .bottom-nav {
            flex-shrink: 0;
            background: var(--color-surface);
            backdrop-filter: var(--glass-blur);
            -webkit-backdrop-filter: var(--glass-blur);
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            padding-bottom: var(--safe-bottom);
            display: flex; justify-content: space-around; align-items: center;
            z-index: 10;
        }

        .nav-item {
            flex: 1; padding: 12px 0;
            display: flex; flex-direction: column; align-items: center; gap: 4px;
            background: transparent; border: none; color: var(--color-text-secondary);
            font-size: 11px; font-weight: 600; cursor: pointer; transition: 0.3s;
        }
        .nav-item svg { width: 24px; height: 24px; stroke: currentColor; transition: 0.3s; }
        
        .nav-item.active { color: var(--color-text-primary); }
        .nav-item.active svg { stroke: var(--color-primary); transform: scale(1.1); }

        /* Toast */
        #toast {
            position: fixed; bottom: calc(var(--safe-bottom) + 80px); left: 50%; transform: translateX(-50%) translateY(20px);
            background: var(--color-error); color: white; padding: 10px 20px;
            border-radius: 100px; font-size: 13px; font-weight: 600; opacity: 0; pointer-events: none; transition: 0.3s; z-index: 1000;
        }
        #toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(-5px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div id="app-bg"></div>

<header class="top-bar">
    <div class="header-content">
        <div id="header-search" class="view-header active">
            <div class="search-input-wrapper">
                <input type="text" id="search-input" placeholder="搜尋歌曲..." autocomplete="off">
            </div>
        </div>

        <div id="header-live" class="view-header">
            <div class="now-playing">
                <img id="album-cover" src="" alt="Cover">
                <div class="track-info">
                    <h4 id="track-title">等待播放...</h4>
                    <p id="track-artist">Spotify Offline</p>
                </div>
            </div>
        </div>
    </div>
    <div class="progress-bar-container"><div class="progress-bar-fill" id="progress-bar"></div></div>
</header>

<main id="lyrics-viewport">
    <div class="empty-state" id="empty-state">
        <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><path d="M8 14s1.5 2 4 2 4-2 4-2"></path><line x1="9" y1="9" x2="9.01" y2="9"></line><line x1="15" y1="9" x2="15.01" y2="9"></line></svg>
        <p>準備就緒</p>
    </div>
</main>

<nav class="bottom-nav">
    <button class="nav-item active" id="tab-search" onclick="appState.setMode('search')">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="11" cy="11" r="8"></circle>
            <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
        </svg>
        <span>搜尋</span>
    </button>
    <button class="nav-item" id="tab-live" onclick="appState.setMode('live')">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M9 18V5l12-2v13"></path>
            <circle cx="6" cy="18" r="3"></circle>
            <circle cx="18" cy="16" r="3"></circle>
        </svg>
        <span>LIVE</span>
    </button>
</nav>

<div id="toast"></div>

<script>
    const API_BASE = "https://lyrics-back.vercel.app";
    
    const DOM = {
        bg: document.getElementById('app-bg'),
        viewport: document.getElementById('lyrics-viewport'),
        emptyState: document.getElementById('empty-state'),
        searchInput: document.getElementById('search-input'),
        headerSearch: document.getElementById('header-search'),
        headerLive: document.getElementById('header-live'),
        tabSearch: document.getElementById('tab-search'),
        tabLive: document.getElementById('tab-live'),
        toast: document.getElementById('toast'),
        trackTitle: document.getElementById('track-title'),
        trackArtist: document.getElementById('track-artist'),
        albumCover: document.getElementById('album-cover'),
        progressBar: document.getElementById('progress-bar')
    };

    const appState = {
        mode: 'search', 
        isPlaying: false,
        currentTrackId: null,
        duration: 0,
        lastApiTime: 0,
        localStartTime: 0,
        lyrics: [],
        pollInterval: null,

        setMode(newMode) {
            this.mode = newMode;
            
            // 切換底部 Tab 樣式
            DOM.tabSearch.classList.toggle('active', newMode === 'search');
            DOM.tabLive.classList.toggle('active', newMode === 'live');
            
            // 切換頂部 Header 視圖
            if (newMode === 'live') {
                DOM.headerSearch.classList.remove('active');
                DOM.headerLive.classList.add('active');
                DOM.progressBar.style.display = 'block';
                this.startLivePolling();
            } else {
                DOM.headerLive.classList.remove('active');
                DOM.headerSearch.classList.add('active');
                DOM.progressBar.style.display = 'none';
                this.stopLivePolling();
                DOM.bg.style.backgroundImage = 'none';
            }
        },

        startLivePolling() {
            liveService.fetchStatus();
            this.pollInterval = setInterval(() => liveService.fetchStatus(), 4000);
            requestAnimationFrame(liveService.renderLoop);
        },

        stopLivePolling() {
            clearInterval(this.pollInterval);
            this.isPlaying = false;
        }
    };

    const uiUtils = {
        showToast(message) {
            DOM.toast.textContent = message;
            DOM.toast.classList.add('show');
            setTimeout(() => DOM.toast.classList.remove('show'), 3500);
        },
        clearLyrics() {
            DOM.viewport.innerHTML = '';
            appState.lyrics = [];
        },
        showEmptyState(show) {
            if (show) {
                this.clearLyrics();
                DOM.viewport.appendChild(DOM.emptyState);
            } else if (DOM.emptyState.parentNode) {
                DOM.emptyState.remove();
            }
        }
    };

    const lyricsService = {
        async fetch(track, artist) {
            uiUtils.showEmptyState(false);
            DOM.viewport.innerHTML = '<div class="lrc-line">正在尋找歌詞...</div>';
            try {
                const res = await fetch(`${API_BASE}/api/get?track_name=${encodeURIComponent(track)}&artist_name=${encodeURIComponent(artist)}`);
                const data = await res.json();
                this.render(data.syncedLyrics || []);
            } catch (err) {
                DOM.viewport.innerHTML = '<div class="lrc-line">無法載入歌詞</div>';
            }
        },
        
        render(lrcRaw) {
            uiUtils.clearLyrics();
            const lines = Array.isArray(lrcRaw) ? lrcRaw : lrcRaw.split('\n');
            
            if (lines.length === 0 || !lrcRaw) {
                DOM.viewport.innerHTML = '<div class="lrc-line">此歌曲無動態歌詞</div>';
                return;
            }

            appState.lyrics = lines.map((line, i) => {
                const match = line.match(/\[(\d{2}):(\d{2}\.\d{2,3})\](.*)/);
                if (!match) return null;
                const time = parseInt(match[1]) * 60 + parseFloat(match[2]);
                const text = match[3].trim();
                
                const div = document.createElement('div');
                div.className = 'lrc-line';
                div.textContent = text || "•••";
                DOM.viewport.appendChild(div);
                return { time, element: div };
            }).filter(Boolean);
        },

        sync(currentSeconds) {
            const data = appState.lyrics;
            const activeIndex = data.findIndex((l, i) => currentSeconds >= l.time && (!data[i+1] || currentSeconds < data[i+1].time));
            
            if (activeIndex !== -1) {
                const el = data[activeIndex].element;
                if (!el.classList.contains('active')) {
                    document.querySelectorAll('.lrc-line').forEach(l => l.classList.remove('active'));
                    el.classList.add('active');
                    // 更平滑的捲動置中對齊
                    el.scrollIntoView({ behavior: 'smooth', block: 'center' });
                }
            }
        }
    };

    const liveService = {
        async fetchStatus() {
            try {
                const res = await fetch(`${API_BASE}/api/current`);
                const data = await res.json();

                if (data.status_code === 403) {
                    uiUtils.showToast("需要 Spotify Premium 權限");
                    appState.isPlaying = false;
                    return;
                }

                if (data.item && data.is_playing) {
                    appState.lastApiTime = data.progress_ms;
                    appState.localStartTime = performance.now();
                    appState.duration = data.item.duration_ms;
                    appState.isPlaying = true;

                    if (appState.currentTrackId !== data.item.id) {
                        appState.currentTrackId = data.item.id;
                        this.updateTrackInfo(data.item);
                        lyricsService.fetch(data.item.name, data.item.artists[0].name);
                    }
                } else {
                    appState.isPlaying = false;
                    DOM.trackTitle.textContent = "目前未播放";
                    DOM.trackArtist.textContent = "-";
                    DOM.progressBar.style.width = '0%';
                }
            } catch (err) {
                console.error("Live sync error:", err);
            }
        },

        updateTrackInfo(track) {
            DOM.trackTitle.textContent = track.name;
            DOM.trackArtist.textContent = track.artists[0].name;
            // 抓取最小尺寸封面加快載入速度
            const imgUrl = track.album.images.length > 1 ? track.album.images[1].url : track.album.images[0].url;
            DOM.albumCover.src = imgUrl;
            DOM.bg.style.backgroundImage = `url(${imgUrl})`;
        },

        renderLoop() {
            if (appState.mode === 'live' && appState.isPlaying) {
                const timePassed = performance.now() - appState.localStartTime;
                const currentMs = appState.lastApiTime + timePassed;
                
                const percent = Math.min((currentMs / appState.duration) * 100, 100);
                DOM.progressBar.style.width = `${percent}%`;

                if (appState.lyrics.length > 0) {
                    lyricsService.sync(currentMs / 1000);
                }
            }
            if (appState.mode === 'live') {
                requestAnimationFrame(liveService.renderLoop);
            }
        }
    };

    // 鍵盤搜尋事件
    DOM.searchInput.addEventListener('keypress', e => {
        if (e.key === 'Enter' && e.target.value.trim()) {
            lyricsService.fetch(e.target.value.trim(), "");
            e.target.blur(); 
        }
    });
</script>
</body>
</html>
