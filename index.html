<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Lyrics Live - 歌詞同步器</title>
    <style>
        /* 基礎樣式 */
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        :root {
            --bg-color: #050505;
            --card-bg: rgba(255, 255, 255, 0.08);
            --accent: #1DB954;
            --text-main: #ffffff;
            --text-dim: rgba(255, 255, 255, 0.3);
            --safe-padding: 20px;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        /* 頂部區域 */
        .header-controls {
            padding: var(--safe-padding);
            padding-top: calc(var(--safe-padding) + 10px);
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(20px);
            z-index: 100;
        }

        .search-wrapper { max-width: 500px; margin: 0 auto; width: 100%; }

        input {
            width: 100%;
            padding: 16px 20px;
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            background: var(--card-bg);
            color: white;
            font-size: 16px;
            outline: none;
        }

        .mode-container { display: flex; gap: 12px; margin-top: 15px; }

        button {
            flex: 1;
            padding: 12px;
            border-radius: 12px;
            border: none;
            background: var(--card-bg);
            color: var(--text-dim);
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        button.active { background: var(--accent); color: #000; }

        /* 歌詞區域 */
        #lyrics-container {
            flex: 1;
            overflow-y: auto;
            padding: 0 var(--safe-padding);
            display: flex;
            flex-direction: column;
            align-items: center;
            scroll-behavior: smooth;
            overscroll-behavior-y: contain;
        }

        #lyrics-container::before, #lyrics-container::after { content: ""; display: block; min-height: 40vh; flex-shrink: 0; }

        .lyric-line {
            width: 100%;
            max-width: 500px;
            padding: 15px 0;
            font-size: 1.6rem;
            font-weight: 700;
            color: var(--text-dim);
            text-align: center;
            transition: all 0.4s ease;
            word-wrap: break-word;
        }

        .lyric-line.active { color: var(--text-main); transform: scale(1.1); }
    </style>
</head>
<body>

<div class="header-controls">
    <div class="search-wrapper">
        <input type="text" id="search-input" placeholder="搜尋歌名...">
        <div class="mode-container">
            <button id="search-btn" class="active" onclick="setMode('search')">搜尋模式</button>
            <button id="live-btn" onclick="setMode('live')">LIVE 模式</button>
        </div>
    </div>
</div>

<div id="lyrics-container">
    <div class="lyric-line active">準備就緒</div>
    <div class="lyric-line">請搜尋歌曲以開始</div>
</div>

<script>
    let mode = 'search';
    let lyricsData = [];

    function setMode(newMode) {
        mode = newMode;
        document.getElementById('search-btn').className = (mode === 'search') ? 'active' : '';
        document.getElementById('live-btn').className = (mode === 'live') ? 'active' : '';
    }

    function parseLRC(lrcText) {
        // 簡單解析格式，將文字轉成陣列
        const lines = lrcText.split('\n');
        return lines.map(line => {
            const match = line.match(/\[(\d{2}):(\d{2}\.\d{2})\](.*)/);
            return match ? { time: parseInt(match[1])*60 + parseFloat(match[2]), text: match[3] } : null;
        }).filter(l => l);
    }

    document.getElementById('search-input').onkeypress = async (e) => {
        if (e.key === 'Enter') {
            const query = e.target.value;
            // 替換此處為你的 Vercel API 網址
            const response = await fetch(`/api/get?track_name=${query}&artist_name=`);
            const data = await response.json();
            
            lyricsData = parseLRC(data.syncedLyrics.join('\n'));
            const container = document.getElementById('lyrics-container');
            container.innerHTML = lyricsData.map((l, i) => `<div class="lyric-line" id="line-${i}">${l.text}</div>`).join('');
        }
    };
</script>
</body>
</html>
