<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lyrics Live Player</title>
    <style>
        :root {
            --bg-color: #0f0f0f;
            --active-text: #ffffff;
            --inactive-text: rgba(255, 255, 255, 0.2);
            --accent: #1DB954; /* Spotify Green */
        }

        body {
            background-color: var(--bg-color);
            color: var(---active-text);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        /* 頂部控制列 */
        .controls {
            padding: 20px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            z-index: 10;
        }

        input {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: none;
            background: #2a2a2a;
            color: white;
            margin-bottom: 10px;
        }

        .mode-switch {
            display: flex;
            gap: 10px;
        }

        button {
            flex: 1;
            padding: 8px;
            border-radius: 20px;
            border: 1px solid var(--accent);
            background: transparent;
            color: var(--accent);
            cursor: pointer;
        }

        button.active {
            background: var(--accent);
            color: black;
        }

        /* 歌詞容器 */
        #lyrics-container {
            flex: 1;
            overflow-y: auto;
            padding: 40vh 20px; /* 讓第一句歌詞也能居中 */
            text-align: center;
            scroll-behavior: smooth;
        }

        .lyric-line {
            font-size: 1.5rem;
            font-weight: bold;
            margin: 20px 0;
            transition: all 0.3s ease;
            color: var(--inactive-text);
        }

        .lyric-line.active {
            color: var(--active-text);
            transform: scale(1.1);
        }
    </style>
</head>
<body>

<div class="controls">
    <input type="text" id="search-input" placeholder="搜尋歌名或歌手...">
    <div class="mode-switch">
        <button id="search-mode" class="active">Search 模式</button>
        <button id="live-mode">Live 模式 (同步 Spotify)</button>
    </div>
</div>

<div id="lyrics-container">
    <div class="lyric-line">請搜尋歌曲或開始播放</div>
</div>

<script>
    let currentMode = 'search';
    let lyricsData = []; // 格式: [{time: 12, text: '...'}, ...]
    let pollInterval;

    const container = document.getElementById('lyrics-container');
    const searchInput = document.getElementById('search-input');

    // 模式切換
    document.getElementById('search-mode').onclick = () => switchMode('search');
    document.getElementById('live-mode').onclick = () => switchMode('live');

    function switchMode(mode) {
        currentMode = mode;
        document.querySelectorAll('button').forEach(b => b.classList.remove('active'));
        document.getElementById(`${mode}-mode`).classList.add('active');
        
        if (mode === 'live') {
            startLivePolling();
        } else {
            stopLivePolling();
        }
    }

    // 模擬搜尋 (這裡要換成你部署在 Vercel 的 API 網址)
    searchInput.onkeypress = async (e) => {
        if (e.key === 'Enter') {
            const track = e.target.value;
            // 這裡暫時手動調用 API (記得改為你的 Vercel 網址)
            const res = await fetch(`/api/get?track_name=${track}&artist_name=`);
            const data = await res.json();
            renderLyrics(data.syncedLyrics);
        }
    };

    function renderLyrics(syncedLyrics) {
        // 解析 LRC
        lyricsData = syncedLyrics.map(line => {
            const match = line.match(/\[(\d{2}):(\d{2}\.\d{2})\](.*)/);
            return match ? { time: parseInt(match[1])*60 + parseFloat(match[2]), text: match[3] } : null;
        }).filter(l => l);

        // 顯示到畫面上
        container.innerHTML = lyricsData.map((l, i) => 
            `<div class="lyric-line" id="line-${i}">${l.text}</div>`
        ).join('');
    }

    // Live 模式核心：輪詢 Spotify 進度
    function startLivePolling() {
        pollInterval = setInterval(async () => {
            // 1. 向你的 API 請求 Spotify 目前的進度 (progress_ms)
            // 2. 假設我們拿到了 progressSec
            let progressSec = 15.5; // 這邊要換成實時從 API 拿到的值
            
            updateActiveLine(progressSec);
        }, 1000);
    }

    function stopLivePolling() {
        clearInterval(pollInterval);
    }

    function updateActiveLine(currentTime) {
        const index = lyricsData.findIndex((line, i) => {
            const nextLine = lyricsData[i + 1];
            return currentTime >= line.time && (!nextLine || currentTime < nextLine.time);
        });

        if (index !== -1) {
            document.querySelectorAll('.lyric-line').forEach(l => l.classList.remove('active'));
            const activeEl = document.getElementById(`line-${index}`);
            if (activeEl) {
                activeEl.classList.add('active');
                activeEl.scrollIntoView({ behavior: 'smooth', block: 'center' });
            }
        }
    }
</script>

</body>
</html>
