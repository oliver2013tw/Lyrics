<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Universal Lyrics Live</title>
    <style>
        /* 基礎全裝置重置 */
        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            margin: 0;
            padding: 0;
        }

        :root {
            --bg: #000000;
            --accent: #1DB954;
            --text-active: #ffffff;
            --text-dim: rgba(255, 255, 255, 0.25);
            --header-bg: rgba(10, 10, 10, 0.85);
            --safe-area-inset-top: env(safe-area-inset-top);
        }

        body {
            background-color: var(--bg);
            color: var(--text-active);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden; /* 禁止 Body 捲動，由容器處理 */
            overscroll-behavior: none; /* 全裝置禁止橡皮筋回彈 */
        }

        /* 響應式頂部控制列 */
        .header {
            padding: calc(var(--safe-area-inset-top) + 20px) 20px 20px;
            background: var(--header-bg);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            z-index: 100;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .control-panel {
            max-width: 800px;
            margin: 0 auto;
            width: 100%;
        }

        input {
            width: 100%;
            padding: 14px 18px;
            border-radius: 14px;
            background: #1a1a1a;
            border: 1px solid #333;
            color: white;
            font-size: 16px; /* 避免手機輸入自動放大 */
            outline: none;
            transition: all 0.3s;
        }

        input:focus { border-color: var(--accent); background: #222; }

        .mode-selector {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }

        button {
            flex: 1;
            padding: 10px;
            border-radius: 10px;
            border: none;
            background: rgba(255,255,255,0.05);
            color: var(--text-dim);
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
            font-size: 14px;
        }

        button.active {
            background: var(--accent);
            color: #000;
        }

        /* 萬用歌詞容器 */
        #lyrics-viewport {
            flex: 1;
            width: 100%;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            align-items: center;
            /* 預設內容少時垂直置中 */
            justify-content: center; 
            padding: 0 25px;
            scroll-behavior: smooth;
            -webkit-overflow-scrolling: touch;
            overscroll-behavior-y: none;
        }

        /* 當歌詞長度超過螢幕時，切換為從頭開始排的 Class */
        #lyrics-viewport.scrollable {
            justify-content: flex-start;
        }

        /* 預留底部與頂部空間，讓歌詞能捲動到中間 */
        #lyrics-viewport.scrollable::before,
        #lyrics-viewport.scrollable::after {
            content: "";
            display: block;
            min-height: 45vh;
            flex-shrink: 0;
        }

        .lrc-line {
            width: 100%;
            max-width: 700px;
            padding: 22px 0;
            font-size: clamp(1.4rem, 4vw, 2.2rem); /* 根據螢幕大小自動縮放字體 */
            font-weight: 800;
            text-align: center;
            color: var(--text-dim);
            transition: all 0.5s cubic-bezier(0.12, 0, 0.39, 0);
            flex-shrink: 0;
            user-select: none;
        }

        .lrc-line.active {
            color: var(--text-active);
            transform: scale(1.05);
        }

        /* 桌機端優化捲動條 */
        #lyrics-viewport::-webkit-scrollbar { width: 4px; }
        #lyrics-viewport::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 10px; }
    </style>
</head>
<body>

<header class="header">
    <div class="control-panel">
        <input type="text" id="search-bar" placeholder="輸入歌曲名稱並按 Enter...">
        <div class="mode-selector">
            <button id="search-mode" class="active">搜尋模式</button>
            <button id="live-mode">LIVE 模式</button>
        </div>
    </div>
</header>

<main id="lyrics-viewport">
    <div class="lrc-line active">Ready</div>
    <div class="lrc-line">輸入歌曲名稱開始</div>
</main>

<script>
    const viewport = document.getElementById('lyrics-viewport');
    const searchInput = document.getElementById('search-bar');
    let lyricsArray = [];

    // 自動切換捲動邏輯
    function checkScrollable() {
        if (viewport.scrollHeight > viewport.clientHeight) {
            viewport.classList.add('scrollable');
        } else {
            viewport.classList.remove('scrollable');
        }
    }

    // 處理搜尋
    searchInput.addEventListener('keypress', async (e) => {
        if (e.key === 'Enter') {
            const query = e.target.value;
            if(!query) return;

            // 這裡接入你部署在 Vercel 或 Replit 的 API 網址
            try {
                const res = await fetch(`/api/get?track_name=${encodeURIComponent(query)}&artist_name=`);
                const data = await res.json();
                render(data.syncedLyrics);
            } catch (err) {
                console.error("Fetch Error:", err);
            }
        }
    });

    function render(rawLRC) {
        viewport.innerHTML = '';
        // 兼容多種 LRC 換行格式
        const lines = Array.isArray(rawLRC) ? rawLRC : rawLRC.split('\n');
        
        lyricsArray = lines.map((line, index) => {
            const match = line.match(/\[(\d{2}):(\d{2}\.\d{2})\](.*)/);
            const text = match ? match[3].trim() : line.trim();
            const time = match ? (parseInt(match[1]) * 60 + parseFloat(match[2])) : 0;

            const div = document.createElement('div');
            div.className = 'lrc-line';
            div.id = `line-${index}`;
            div.innerText = text || "•••";
            viewport.appendChild(div);

            return { time, element: div };
        }).filter(item => item.text !== "");

        checkScrollable();
    }

    // 模式切換按鈕視覺
    document.querySelectorAll('.mode-selector button').forEach(btn => {
        btn.onclick = () => {
            document.querySelectorAll('.mode-selector button').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
        };
    });

    // 視窗大小改變時重新計算捲動
    window.onresize = checkScrollable;
</script>

</body>
</html>
