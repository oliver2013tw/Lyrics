<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lyrics Viewer</title>
    <style>
        :root {
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
            --accent-color: #00d2ff;
            --text-main: #ffffff;
            --text-dim: #b0b0b0;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: var(--text-main);
            overflow: hidden;
        }

        /* 毛玻璃容器 */
        .glass-card {
            width: 90%;
            max-width: 500px;
            height: 80vh;
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            display: flex;
            flex-direction: column;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.37);
        }

        /* 搜尋欄位 */
        .search-section {
            padding: 20px;
            border-bottom: 1px solid var(--glass-border);
        }

        .search-box {
            display: flex;
            gap: 10px;
            background: rgba(255, 255, 255, 0.1);
            padding: 8px 15px;
            border-radius: 50px;
            border: 1px solid transparent;
            transition: 0.3s;
        }

        .search-box:focus-within {
            border-color: var(--accent-color);
            background: rgba(255, 255, 255, 0.15);
        }

        .search-box input {
            background: none;
            border: none;
            color: white;
            flex: 1;
            outline: none;
            font-size: 16px;
        }

        .search-box button {
            background: var(--accent-color);
            border: none;
            color: white;
            padding: 5px 15px;
            border-radius: 20px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }

        .search-box button:hover {
            opacity: 0.8;
        }

        /* 歌詞顯示區域 */
        .lyrics-viewport {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            mask-image: linear-gradient(to bottom, transparent 0%, black 10%, black 90%, transparent 100%);
            -webkit-mask-image: linear-gradient(to bottom, transparent 0%, black 10%, black 90%, transparent 100%);
            text-align: center;
            scroll-behavior: smooth;
        }

        /* 隱藏捲軸但保持滾動 */
        .lyrics-viewport::-webkit-scrollbar {
            display: none;
        }

        .lrc-line {
            margin: 25px 0;
            font-size: 1.1rem;
            color: var(--text-dim);
            transition: all 0.4s ease;
            cursor: default;
        }

        .lrc-line.active {
            color: var(--accent-color);
            font-size: 1.4rem;
            font-weight: bold;
            text-shadow: 0 0 15px rgba(0, 210, 255, 0.5);
        }

        .status-msg {
            font-size: 0.9rem;
            color: var(--text-dim);
            margin-top: 10px;
        }
    </style>
</head>
<body>

    <div class="glass-card">
        <div class="search-section">
            <div class="search-box">
                <input type="text" id="search-input" placeholder="搜尋歌名 (例如: Yellow)...">
                <button id="search-btn">搜尋</button>
            </div>
            <div id="status" class="status-msg"></div>
        </div>

        <div class="lyrics-viewport" id="lyrics-viewport">
            <p style="margin-top: 50px; color: rgba(255,255,255,0.3);">輸入歌曲並按 Enter 開始</p>
        </div>
    </div>

    <script>
        const API_BASE = "https://lyrics-back.vercel.app/api/get";
        const searchInput = document.getElementById('search-input');
        const searchBtn = document.getElementById('search-btn');
        const viewport = document.getElementById('lyrics-viewport');
        const status = document.getElementById('status');

        async function fetchLyrics() {
            const query = searchInput.value.trim();
            if (!query) return;

            status.innerText = "搜尋中...";
            viewport.innerHTML = '<p style="margin-top: 50px;">載入中...</p>';

            try {
                const response = await fetch(`${API_BASE}?track_name=${encodeURIComponent(query)}`);
                const data = await response.json();

                if (data.syncedLyrics && data.syncedLyrics.length > 0) {
                    renderLyrics(data.syncedLyrics);
                    status.innerText = "載入完成";
                } else {
                    viewport.innerHTML = '<p style="margin-top: 50px;">找不到歌詞</p>';
                    status.innerText = "";
                }
            } catch (error) {
                console.error("API Error:", error);
                viewport.innerHTML = '<p style="margin-top: 50px; color: #ff4b2b;">API 連線失敗</p>';
                status.innerText = "連線出錯";
            }
        }

        function renderLyrics(lines) {
            viewport.innerHTML = "";
            lines.forEach((line) => {
                // 解析 [00:00.00] 內容
                const cleanText = line.replace(/\[\d{2}:\d{2}\.\d{2}\]/g, "").trim();
                if (cleanText) {
                    const div = document.createElement('div');
                    div.className = 'lrc-line';
                    div.innerText = cleanText;
                    viewport.appendChild(div);
                }
            });
            // 模擬捲動到頂部
            viewport.scrollTop = 0;
        }

        // 監聽搜尋事件
        searchBtn.addEventListener('click', fetchLyrics);
        searchInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') fetchLyrics();
        });
    </script>
</body>
</html>
