<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Universal Lyrics</title>
    <style>
        /* =========================================
           1. Design Tokens (2026 現代化變數)
        ========================================= */
        :root {
            --color-bg: #000000;
            --color-surface: rgba(18, 18, 18, 0.8);
            --color-primary: #1DB954;
            --color-text-main: #ffffff;
            --color-text-sub: rgba(255, 255, 255, 0.4);
            --color-error: #ff453a;
            
            --blur-val: blur(25px);
            --safe-top: env(safe-area-inset-top, 20px);
            --safe-bottom: env(safe-area-inset-bottom, 20px);
        }

        /* =========================================
           2. App Base Layout
        ========================================= */
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        
        body {
            background-color: var(--color-bg);
            color: var(--color-text-main);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            height: 100vh; height: 100dvh; 
            display: flex; flex-direction: column;
            overflow: hidden; overscroll-behavior: none;
        }

        /* 動態模糊背景層 */
        #app-bg {
            position: fixed; inset: -10%; width: 120%; height: 120%;
            background-size: cover; background-position: center;
            filter: blur(60px) brightness(0.35);
            z-index: -1; transition: background-image 1.2s ease;
        }

        /* =========================================
           3. Top App Bar (Header)
        ========================================= */
        .top-bar {
            padding: calc(var(--safe-top) + 10px) 20px 15px;
            background: var(--color-surface);
            backdrop-filter: var(--blur-val); -webkit-backdrop-filter: var(--blur-val);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            z-index: 10; position: relative;
        }

        .header-wrap { max-width: 600px; margin: 0 auto; height: 50px; display: flex; align-items: center; }

        /* 視圖切換內容 */
        .view-content { display: none; width: 100%; animation: fadeIn 0.3s ease; }
        .view-content.active { display: flex; align-items: center; }

        /* 搜尋框 */
        .search-box {
            width: 100%; padding: 12px 16px; border-radius: 12px;
            background: rgba(255, 255, 255, 0.1); border: 1px solid transparent;
            color: white; font-size: 16px; outline: none;
        }
        .search-box:focus { border-color: var(--color-primary); background: rgba(255, 255, 255, 0.15); }

        /* 播放資訊 */
        .now-playing { display: flex; align-items: center; gap: 12px; width: 100%; }
        #album-cover { 
            width: 44px; height: 44px; border-radius: 8px; object-fit: cover; 
            background: #222; text-indent: -10000px; /* 隱藏碎掉圖示的文字 */
        }
        .track-meta { flex: 1; overflow: hidden; }
        .track-meta h4 { font-size: 15px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .track-meta p { font-size: 13px; color: var(--color-primary); font-weight: 600; }

        /* 進度條 (細線風格) */
        .progress-line {
            position: absolute; bottom: 0; left: 0; width: 100%; height: 2px;
            background: rgba(255,255,255,0.05);
        }
        #progress-fill { height: 100%; width: 0%; background: var(--color-primary); transition: width 0.1s linear; }

        /* =========================================
           4. Lyrics Content Area
        ========================================= */
        #lyrics-viewport {
            flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch;
            padding: 0 25px; scroll-behavior: smooth;
        }
        #lyrics-viewport::before, #lyrics-viewport::after { content: ""; display: block; min-height: 40vh; }

        .lrc-line {
            padding: 20px 0; font-weight: 800; line-height: 1.4;
            font-size: clamp(1.5rem, 6vw, 2.3rem); color: var(--color-text-sub);
            transition: all 0.4s cubic-bezier(0.33, 1, 0.68, 1);
        }
        .lrc-line.active { color: var(--color-text-main); transform: scale(1.05); }

        .empty-state {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            text-align: center; color: var(--color-text-sub); opacity: 0.6;
        }

        /* =========================================
           5. Bottom Tab Bar
        ========================================= */
        .bottom-nav {
            background: var(--color-surface);
            backdrop-filter: var(--blur-val); -webkit-backdrop-filter: var(--blur-val);
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            padding-bottom: var(--safe-bottom);
            display: flex; height: calc(65px + var(--safe-bottom));
        }

        .tab-item {
            flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;
            gap: 4px; border: none; background: none; color: var(--color-text-sub);
            font-size: 11px; font-weight: 700; cursor: pointer; transition: 0.3s;
        }
        .tab-item svg { width: 24px; height: 24px; stroke: currentColor; fill: none; stroke-width: 2.5; }
        .tab-item.active { color: var(--color-text-main); }
        .tab-item.active svg { stroke: var(--color-primary); transform: translateY(-2px); }

        /* Toast 訊息 */
        #toast {
            position: fixed; bottom: calc(var(--safe-bottom) + 80px); left: 50%; transform: translateX(-50%) translateY(20px);
            background: var(--color-error); color: white; padding: 10px 22px; border-radius: 100px;
            font-size: 13px; font-weight: 600; opacity: 0; transition: 0.3s; z-index: 1000;
        }
        #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

<div id="app-bg"></div>

<header class="top-bar">
    <div class="header-wrap">
        <div id="view-header-search" class="view-content active">
            <input type="text" id="search-input" class="search-box" placeholder="搜尋歌曲歌詞...">
        </div>
        <div id="view-header-live" class="view-content">
            <div class="now-playing">
                <img id="album-cover" src="wave.png" alt="" onerror="this.src='wave.png';">
                <div class="track-meta">
                    <h4 id="track-name">等待播放...</h4>
                    <p id="artist-name">Spotify</p>
                </div>
            </div>
        </div>
    </div>
    <div class="progress-line"><div id="progress-fill"></div></div>
</header>

<main id="lyrics-viewport">
    <div class="empty-state" id="empty-state">
        <p>搜尋歌曲或開始播放 Spotify</p>
    </div>
</main>

<nav class="bottom-nav">
    <button class="tab-item active" onclick="app.setMode('search')" id="tab-search">
        <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
        <span>搜尋</span>
    </button>
    <button class="tab-item" onclick="app.setMode('live')" id="tab-live">
        <svg viewBox="0 0 24 24"><path d="M9 18V5l12-2v13"></path><circle cx="6" cy="18" r="3"></circle><circle cx="18" cy="16" r="3"></circle></svg>
        <span>LIVE</span>
    </button>
</nav>

<div id="toast"></div>

<script>
    /**
     * =========================================
     * App 核心邏輯 (優化延遲與圖片 Fallback)
     * =========================================
     */
    const API_BASE = "https://lyrics-back.vercel.app";

    const app = {
        mode: 'search',
        isPlaying: false,
        trackId: null,
        duration: 0,
        lastApiTime: 0,
        localStartTime: 0,
        lyrics: [],
        timer: null,

        // 介面切換
        setMode(mode) {
            this.mode = mode;
            document.getElementById('tab-search').classList.toggle('active', mode === 'search');
            document.getElementById('tab-live').classList.toggle('active', mode === 'live');
            document.getElementById('view-header-search').classList.toggle('active', mode === 'search');
            document.getElementById('view-header-live').classList.toggle('active', mode === 'live');
            
            if (mode === 'live') {
                this.startLive();
            } else {
                this.stopLive();
                document.getElementById('app-bg').style.backgroundImage = 'none';
            }
        },

        // LIVE 模式啟動
        async startLive() {
            this.fetchLive();
            this.timer = setInterval(() => this.fetchLive(), 4000);
            requestAnimationFrame(() => this.renderLoop());
        },

        stopLive() {
            clearInterval(this.timer);
            this.isPlaying = false;
        },

        async fetchLive() {
            try {
                const res = await fetch(`${API_BASE}/api/current`);
                const data = await res.json();

                if (data.status_code === 403) {
                    this.showToast("LIVE 模式需要 Spotify Premium");
                    return;
                }

                if (data.item && data.is_playing) {
                    this.lastApiTime = data.progress_ms;
                    this.localStartTime = performance.now();
                    this.duration = data.item.duration_ms;
                    this.isPlaying = true;

                    if (this.trackId !== data.item.id) {
                        this.trackId = data.item.id;
                        this.updateUI(data.item);
                        this.fetchLyrics(data.item.name, data.item.artists[0].name);
                    }
                } else {
                    this.isPlaying = false;
                }
            } catch (e) { console.error(e); }
        },

        updateUI(track) {
            document.getElementById('track-name').textContent = track.name;
            document.getElementById('artist-name').textContent = track.artists[0].name;
            
            // 圖片補強：優先用 Spotify，失敗自動換 wave.png
            const img = document.getElementById('album-cover');
            const bg = document.getElementById('app-bg');
            if (track.album.images && track.album.images.length > 0) {
                const url = track.album.images[0].url;
                img.src = url;
                bg.style.backgroundImage = `url(${url})`;
            } else {
                img.src = 'wave.png';
                bg.style.backgroundImage = 'none';
            }
        },

        async fetchLyrics(track, artist) {
            const vp = document.getElementById('lyrics-viewport');
            const es = document.getElementById('empty-state');
            if (es) es.remove();
            vp.innerHTML = '<div class="lrc-line">尋找歌詞中...</div>';

            try {
                const res = await fetch(`${API_BASE}/api/get?track_name=${encodeURIComponent(track)}&artist_name=${encodeURIComponent(artist)}`);
                const data = await res.json();
                this.parseLyrics(data.syncedLyrics || "");
            } catch (e) {
                vp.innerHTML = '<div class="lrc-line">無法載入歌詞</div>';
            }
        },

        parseLyrics(lrc) {
            const vp = document.getElementById('lyrics-viewport');
            vp.innerHTML = '';
            const lines = Array.isArray(lrc) ? lrc : lrc.split('\n');
            this.lyrics = lines.map(line => {
                const m = line.match(/\[(\d{2}):(\d{2}\.\d{2,3})\](.*)/);
                if (!m) return null;
                const div = document.createElement('div');
                div.className = 'lrc-line';
                div.textContent = m[3].trim() || "•••";
                vp.appendChild(div);
                return { time: parseInt(m[1]) * 60 + parseFloat(m[2]), el: div };
            }).filter(x => x);
        },

        renderLoop() {
            if (this.mode === 'live' && this.isPlaying) {
                const now = performance.now();
                const currentMs = this.lastApiTime + (now - this.localStartTime);
                
                // 更新進度條
                const p = Math.min((currentMs / this.duration) * 100, 100);
                document.getElementById('progress-fill').style.width = p + '%';

                // 同步歌詞
                const sec = currentMs / 1000;
                const activeIdx = this.lyrics.findIndex((l, i) => sec >= l.time && (!this.lyrics[i+1] || sec < this.lyrics[i+1].time));
                
                if (activeIdx !== -1) {
                    const activeEl = this.lyrics[activeIdx].el;
                    if (!activeEl.classList.contains('active')) {
                        document.querySelectorAll('.lrc-line').forEach(l => l.classList.remove('active'));
                        activeEl.classList.add('active');
                        activeEl.scrollIntoView({ behavior: 'smooth', block: 'center' });
                    }
                }
            }
            if (this.mode === 'live') requestAnimationFrame(() => this.renderLoop());
        },

        showToast(m) {
            const t = document.getElementById('toast');
            t.textContent = m; t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), 3000);
        }
    };

    // 搜尋監聽
    document.getElementById('search-input').addEventListener('keypress', e => {
        if (e.key === 'Enter' && e.target.value.trim()) {
            app.fetchLyrics(e.target.value.trim(), "");
            e.target.blur();
        }
    });
</script>
</body>
</html>
