<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Lyrics Live - Modern UI</title>
    <style>
        /* 全域設定：防止 padding 撐開寬度 */
        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        :root {
            --bg-color: #050505;
            --card-bg: rgba(255, 255, 255, 0.08);
            --accent: #1DB954;
            --text-main: #ffffff;
            --text-dim: rgba(255, 255, 255, 0.3);
            --safe-padding: 20px; /* 控制物件不貼邊的核心變數 */
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Inter', -apple-system, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        /* 頂部控制面板：加入毛玻璃與邊距 */
        .header-controls {
            padding: var(--safe-padding);
            padding-top: calc(var(--safe-padding) + 10px);
            background: linear-gradient(180deg, rgba(0,0,0,0.8) 0%, transparent 100%);
            backdrop-filter: blur(20px);
            z-index: 100;
        }

        .search-wrapper {
            max-width: 600px; /* 防止在平板或橫向模式太寬 */
            margin: 0 auto;
            width: 100%;
        }

        input {
            width: 100%;
            padding: 16px 20px;
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            background: var(--card-bg);
            color: white;
            font-size: 16px; /* 防止 iOS 自動縮放 */
            outline: none;
            transition: border 0.3s;
        }

        input:focus {
            border-color: var(--accent);
        }

        .mode-container {
            display: flex;
            gap: 12px;
            margin-top: 15px;
            max-width: 600px;
            margin-left: auto;
            margin-right: auto;
        }

        button {
            flex: 1;
            padding: 12px;
            border-radius: 12px;
            border: none;
            background: var(--card-bg);
            color: var(--text-dim);
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s;
        }

        button.active {
            background: var(--accent);
            color: #000;
            box-shadow: 0 4px 15px rgba(29, 185, 84, 0.3);
        }

        /* 歌詞區域：確保不會左右貼邊 */
        #lyrics-container {
            flex: 1;
            overflow-y: auto;
            padding: 30vh var(--safe-padding) 40vh var(--safe-padding);
            text-align: center;
            scroll-behavior: smooth;
            mask-image: linear-gradient(to bottom, transparent, black 15%, black 85%, transparent);
            -webkit-mask-image: linear-gradient(to bottom, transparent, black 15%, black 85%, transparent);
        }

        .lyric-line {
            font-size: 1.8rem;
            line-height: 1.4;
            margin: 32px 0;
            font-weight: 700;
            color: var(--text-dim);
            transition: color 0.4s, transform 0.4s;
            word-wrap: break-word; /* 防止長單字撐開 */
        }

        .lyric-line.active {
            color: var(--text-main);
            transform: scale(1.05);
        }

        /* 針對窄螢幕的字體調整 */
        @media (max-width: 380px) {
            .lyric-line { font-size: 1.5rem; }
        }
    </style>
</head>
<body>

<div class="header-controls">
    <div class="search-wrapper">
        <input type="text" id="search-input" placeholder="搜尋歌曲...">
        <div class="mode-container">
            <button id="search-mode" class="active">搜尋模式</button>
            <button id="live-mode">LIVE 模式</button>
        </div>
    </div>
</div>

<div id="lyrics-container">
    <div class="lyric-line active">Ready to Sync?</div>
    <div class="lyric-line">在上方搜尋或開啟 Spotify</div>
</div>

<script>
    // 這裡沿用先前的 JavaScript 邏輯即可
    // 記得將更新 DOM 的部分指向新的 class
</script>

</body>
</html>
